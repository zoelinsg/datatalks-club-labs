services:
  app:
    build: .
    container_name: software-learning-rag-app
    ports:
      - "8501:8501"
    volumes:
      - ./app_logs.sqlite:/app/app_logs.sqlite
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501

  dashboard:
    build: .
    container_name: software-learning-rag-dashboard
    ports:
      - "8502:8502"
    volumes:
      - ./app_logs.sqlite:/app/app_logs.sqlite
    command: streamlit run dashboard.py --server.address=0.0.0.0 --server.port=8502